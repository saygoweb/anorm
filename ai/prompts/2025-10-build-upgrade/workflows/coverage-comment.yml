name: Coverage Comment

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage-comment:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    
    steps:
    - name: Download coverage artifacts
      uses: actions/github-script@v7
      with:
        script: |
          let allArtifacts = await github.rest.actions.listWorkflowRunArtifacts({
             owner: context.repo.owner,
             repo: context.repo.repo,
             run_id: context.payload.workflow_run.id,
          });
          let matchArtifact = allArtifacts.data.artifacts.filter((artifact) => {
            return artifact.name == "coverage-reports"
          })[0];
          if (matchArtifact) {
            let download = await github.rest.actions.downloadArtifact({
               owner: context.repo.owner,
               repo: context.repo.repo,
               artifact_id: matchArtifact.id,
               archive_format: 'zip',
            });
            let fs = require('fs');
            fs.writeFileSync(`${process.env.GITHUB_WORKSPACE}/coverage-reports.zip`, Buffer.from(download.data));
          }

    - name: Extract coverage artifacts
      run: |
        if [ -f coverage-reports.zip ]; then
          unzip coverage-reports.zip
          ls -la
        fi

    - name: Parse coverage and comment on PR
      uses: actions/github-script@v7
      if: github.event.workflow_run.event == 'pull_request'
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          // Check if clover.xml exists
          const cloverPath = 'build/logs/clover.xml';
          if (!fs.existsSync(cloverPath)) {
            console.log('No coverage file found');
            return;
          }
          
          // Parse coverage from clover.xml
          const cloverContent = fs.readFileSync(cloverPath, 'utf8');
          const coverageMatch = cloverContent.match(/statements="(\d+)".*coveredstatements="(\d+)"/);
          
          if (!coverageMatch) {
            console.log('Could not parse coverage from clover.xml');
            return;
          }
          
          const total = parseInt(coverageMatch[1]);
          const covered = parseInt(coverageMatch[2]);
          const percentage = total > 0 ? ((covered / total) * 100).toFixed(2) : 0;
          
          // Get PR number from workflow run
          const prNumber = context.payload.workflow_run.pull_requests[0]?.number;
          if (!prNumber) {
            console.log('No PR number found');
            return;
          }
          
          // Create coverage comment
          const coverageEmoji = percentage >= 80 ? '✅' : percentage >= 60 ? '⚠️' : '❌';
          const comment = `## ${coverageEmoji} Code Coverage Report
          
**Coverage:** ${percentage}%
**Lines covered:** ${covered}/${total}

${percentage >= 80 ? '✅ Coverage meets the 80% threshold!' : 
  percentage >= 60 ? '⚠️ Coverage is below the 80% threshold but above 60%' : 
  '❌ Coverage is below 60% - please add more tests'}

[View detailed coverage report](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.payload.workflow_run.id})`;

          // Post comment
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
            body: comment
          });
