name: PR File Validation

on:
  pull_request:
    branches: [ "master", "main" ]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-pr-files:
    name: Validate PR Files
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get changed files
      id: changed-files
      run: |
        # Get the list of changed files in this PR
        git fetch origin ${{ github.base_ref }}
        CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
        echo "Changed files:"
        echo "$CHANGED_FILES"
        echo "changed_files<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Check for ai/ directory files
      id: check-ai-files
      run: |
        CHANGED_FILES="${{ steps.changed-files.outputs.changed_files }}"
        AI_FILES=$(echo "$CHANGED_FILES" | grep "^ai/" || true)
        
        if [ -n "$AI_FILES" ]; then
          echo "❌ Files under 'ai/' directory are not allowed in pull requests!"
          echo ""
          echo "The following files were found:"
          echo "$AI_FILES"
          echo ""
          echo "Files under 'ai/' can exist in branches but must not be included in pull requests."
          echo "Please remove these files from your PR or move them outside the 'ai/' directory."
          echo "ai_files_found=true" >> $GITHUB_OUTPUT
          echo "ai_files<<EOF" >> $GITHUB_OUTPUT
          echo "$AI_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          exit 1
        else
          echo "✅ No files under 'ai/' directory found in this PR."
          echo "ai_files_found=false" >> $GITHUB_OUTPUT
        fi

    - name: Comment on PR if ai/ files found
      if: failure() && steps.check-ai-files.outputs.ai_files_found == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const aiFiles = '${{ steps.check-ai-files.outputs.ai_files }}';
          const comment = '## ❌ PR File Validation Failed\n\n' +
            'Files under the `ai/` directory are not allowed in pull requests.\n\n' +
            '**Files found:**\n```\n' + aiFiles + '\n```\n\n' +
            '**What you need to do:**\n' +
            '- Remove these files from your PR, or\n' +
            '- Move them outside the `ai/` directory\n\n' +
            'Files under `ai/` can exist in branches but must not be included in pull requests.\n\n' +
            'This check will need to pass before the PR can be merged.';

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
