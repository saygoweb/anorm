version: '3.8'

services:
  db:
    image: mariadb:latest
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: anorm_test
      MARIADB_USER: dev
      MARIADB_PASSWORD: dev
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    restart: always
    environment:
      PMA_HOST: db
      PMA_USER: dev
      PMA_PASSWORD: dev
    ports:
      - "8086:80"
    depends_on:
      - db

  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
    depends_on:
      - db
    environment:
      # Legacy environment variables (keep for compatibility)
      DATABASE_HOST: db
      DATABASE_USER: dev
      DATABASE_PASSWORD: dev
      DATABASE_NAME: anorm_test
      # Test framework environment variables
      DB_HOST: db
      DB_USER: dev
      DB_PASS: dev
      DB_NAME: anorm_test
    command: sleep infinity

volumes:
  db_data: