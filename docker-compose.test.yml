version: '3.8'

services:
  # Database for testing
  db:
    image: mariadb:latest
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: anorm_test
      MARIADB_USER: dev
      MARIADB_PASSWORD: dev
    ports:
      - "3306:3306"
    volumes:
      - test_db_data:/var/lib/mysql

  # PHP 7.4 testing environment
  php74:
    build:
      context: .
      dockerfile: Dockerfile.test
      args:
        PHP_VERSION: "7.4"
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_DATABASE: anorm_test
      DB_USERNAME: dev
      DB_PASSWORD: dev
    command: tail -f /dev/null  # Keep container running

  # PHP 8.0 testing environment
  php80:
    build:
      context: .
      dockerfile: Dockerfile.test
      args:
        PHP_VERSION: "8.0"
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_DATABASE: anorm_test
      DB_USERNAME: dev
      DB_PASSWORD: dev
    command: tail -f /dev/null

  # PHP 8.1 testing environment
  php81:
    build:
      context: .
      dockerfile: Dockerfile.test
      args:
        PHP_VERSION: "8.1"
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_DATABASE: anorm_test
      DB_USERNAME: dev
      DB_PASSWORD: dev
    command: tail -f /dev/null

  # PHP 8.2 testing environment
  php82:
    build:
      context: .
      dockerfile: Dockerfile.test
      args:
        PHP_VERSION: "8.2"
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_DATABASE: anorm_test
      DB_USERNAME: dev
      DB_PASSWORD: dev
    command: tail -f /dev/null

  # PHP 8.3 testing environment
  php83:
    build:
      context: .
      dockerfile: Dockerfile.test
      args:
        PHP_VERSION: "8.3"
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_DATABASE: anorm_test
      DB_USERNAME: dev
      DB_PASSWORD: dev
    command: tail -f /dev/null

volumes:
  test_db_data:
